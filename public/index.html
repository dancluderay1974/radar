<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>e-yar.com | Mission Control</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <!--
      Stage 1: React application mount target.
      Why this exists: React needs a single root node so it can own UI rendering,
      state updates, and event delegation across the mission-control experience.
    -->
    <div id="root"></div>

    <!--
      Stage 2: Runtime React dependencies.
      Why this exists: this prototype intentionally avoids a bundler so the app can
      run directly from the existing Node static server while still using React.
    -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!--
      Stage 3: React source entry.
      Why this exists: Babel transpiles JSX in-browser for this prototype setup.
    -->
    <script type="text/babel" data-type="module" src="/main.js"></script>
  </body>
</html>
