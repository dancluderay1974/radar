<!--
  Stage 1: Define a scalable favicon that closely matches the provided reference.
  Why: Next.js App Router automatically serves app/icon.svg as the tab icon.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Code favicon">
  <!-- Stage 2: Draw the dark rounded-square tile background. -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="#05070F" />

  <!--
    Stage 3: Draw the code glyph (</>) using white strokes.
    Why: Stroked vectors stay crisp at small favicon sizes.
  -->
  <g fill="none" stroke="#FFFFFF" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left angle bracket (<) -->
    <path d="M27 22 L18 32 L27 42" />
    <!-- Forward slash (/) -->
    <path d="M36.5 20 L30 44" />
    <!-- Right angle bracket (>) -->
    <path d="M38 22 L47 32 L38 42" />
  </g>
</svg>
