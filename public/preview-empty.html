<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Preview Not Loaded</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, Arial, sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }

      main {
        width: min(560px, 92vw);
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 14px;
        padding: 24px;
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.35rem;
      }

      p {
        margin: 8px 0;
        line-height: 1.5;
      }

      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        background: #f1f5f9;
        border-radius: 6px;
        padding: 2px 6px;
      }
    </style>
  </head>
  <body>
    <!--
      Stage 1: Empty-state preview content.
      Why this exists: prevents the product from showing a default project before
      a user connects GitHub and pulls their own repository.
    -->
    <main>
      <h1>No project loaded yet</h1>
      <p>Connect your GitHub account in the left panel, then run <code>Pull Repository</code>.</p>
      <p>The live preview will appear here after the repository pull succeeds.</p>
    </main>
  </body>
</html>
